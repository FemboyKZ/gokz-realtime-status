name: Build
on:
  push:
    branches: ['*']
    tags: ['*']
  pull_request:
    branches: ['*']
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            os_short: linux
            ext: .so
          - os: windows-latest
            os_short: windows
            ext: .dll
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os_short }}-x86
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          path: project

      - name: Checkout SourceMod
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/sourcemod
          ref: 1.12-dev
          submodules: recursive
          path: sourcemod

      - name: Checkout Metamod:Source
        uses: actions/checkout@v6
        with:
          repository: alliedmodders/metamod-source
          ref: 1.12-dev
          path: metamod-source

      - uses: actions/setup-python@v6
        name: Setup Python
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          cd ambuild
          python setup.py install --user

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev-i386 linux-libc-dev:i386

      - name: Build extension
        working-directory: project
        shell: bash
        run: |
          mkdir build && cd build
          python ../configure.py \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod-source" \
            --enable-optimize \
            --targets=x86
          ambuild

      - name: Setup SourcePawn Compiler
        id: setup-sp
        uses: rumblefrog/setup-sp@v1.2.4
        with:
          version: "1.12.x"

      - name: Build bridge plugin
        shell: bash
        run: |
          spcomp \
            "${{ github.workspace }}/project/scripting/gokz-rts-bridge.sp" \
            -i "${{ github.workspace }}/project/scripting/include" \
            -i "${{ github.workspace }}/project/sm-json/addons/sourcemod/scripting/include" \
            -i "${{ github.workspace }}/project/gokz/addons/sourcemod/scripting/include" \
            -i "$includePath" \
            -o "${{ github.workspace }}/project/build/gokz-rts-bridge.smx"

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p staging/addons/sourcemod/extensions
          mkdir -p staging/addons/sourcemod/plugins
          mkdir -p staging/addons/sourcemod/scripting/include
          mkdir -p staging/addons/sourcemod/configs
          find project/build -name '*${{ matrix.ext }}' -exec cp {} staging/addons/sourcemod/extensions/ \;
          touch staging/addons/sourcemod/extensions/gokz-realtime-status.autoload
          cp project/build/gokz-rts-bridge.smx staging/addons/sourcemod/plugins/
          cp project/scripting/include/gokz-rts.inc staging/addons/sourcemod/scripting/include/
          cp project/configs/gokz-rts.cfg staging/addons/sourcemod/configs/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gokz-realtime-status-${{ matrix.os_short }}
          path: staging/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v7
        with:
          name: gokz-realtime-status-linux
          path: linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: gokz-realtime-status-windows
          path: windows

      - name: Create archives
        run: |
          cd linux && tar -czf ../gokz-realtime-status-linux.tar.gz . && cd ..
          cd windows && zip -r ../gokz-realtime-status-windows.zip . && cd ..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gokz-realtime-status-linux.tar.gz
            gokz-realtime-status-windows.zip
