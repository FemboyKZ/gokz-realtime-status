name: Build
on:
  push:
    branches: ['*']
    tags: ['*']
  pull_request:
    branches: ['*']
jobs:
  build:
    runs-on: ubuntu-latest
    name: compile
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup SourcePawn Compiler
        id: setup-sp
        uses: rumblefrog/setup-sp@v1.2.4
        with:
          version: "1.12.x"

      - name: Compile plugin
        shell: bash
        run: |
          mkdir -p build
          spcomp \
            "scripting/gokz-rts.sp" \
            -i "sm-ext-json/scripting/include" \
            -i "sm-ext-websocket/scripting/include" \
            -i "gokz/addons/sourcemod/scripting/include" \
            -i "$includePath" \
            -o "build/gokz-rts.smx"

      - name: Stage release files
        run: |
          mkdir -p staging/addons/sourcemod/plugins
          mkdir -p staging/addons/sourcemod/configs
          cp build/gokz-rts.smx staging/addons/sourcemod/plugins/
          cp configs/gokz-rts.cfg staging/addons/sourcemod/configs/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gokz-realtime-status
          path: staging/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: gokz-realtime-status
          path: release

      - name: Create archive
        run: cd release && tar -czf ../gokz-realtime-status.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: gokz-realtime-status.tar.gz
