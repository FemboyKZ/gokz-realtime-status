// GOKZ Realtime Status - Configuration
// Place this file at: addons/sourcemod/configs/gokz-rts.cfg

// API endpoint URL (HTTP only, no HTTPS)
// The extension will POST JSON data to this URL periodically
api_url "http://api.somedomain.com:3000/servers/status"

// API authentication key (sent as Authorization: Bearer header)
// Must match ADMIN_API_KEY in the API's .env file
// Leave empty for no authentication (not recommended)
api_key ""

// Server IP override (RECOMMENDED)
// The "hostip" ConVar often returns 0.0.0.0 which is rejected by the API.
// Set this to your server's public IP address.
// Must match the IP registered in the API's servers.json/database.
server_ip ""

// Server port override (optional, uses hostport ConVar if not set)
// Set this if hostport ConVar is incorrect.
server_port ""

// Reporting interval in seconds (minimum: 1, default: 10)
interval "10"
